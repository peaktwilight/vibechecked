<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Grid background -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow -->
  <circle cx="600" cy="250" r="200" fill="#22c55e" opacity="0.05" filter="blur(80px)"/>

  <!-- Title -->
  <text x="600" y="220" text-anchor="middle" font-family="monospace" font-size="96" font-weight="bold" fill="#22c55e">vibecheck</text>

  <!-- Tagline -->
  <text x="600" y="280" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#888">Is your UI actually good? Or just another vibe-coded clone?</text>

  <!-- Score bars -->
  <g transform="translate(300, 330)">
    <text x="0" y="15" font-family="monospace" font-size="14" fill="#666">Originality</text>
    <rect x="120" y="2" width="400" height="16" rx="2" fill="#1a1a1a"/>
    <rect x="120" y="2" width="248" height="16" rx="2" fill="#eab308"/>
    <text x="530" y="15" font-family="monospace" font-size="14" fill="#eab308">62</text>

    <text x="0" y="45" font-family="monospace" font-size="14" fill="#666">Layout</text>
    <rect x="120" y="32" width="400" height="16" rx="2" fill="#1a1a1a"/>
    <rect x="120" y="32" width="140" height="16" rx="2" fill="#ef4444"/>
    <text x="530" y="45" font-family="monospace" font-size="14" fill="#ef4444">35</text>

    <text x="0" y="75" font-family="monospace" font-size="14" fill="#666">Typography</text>
    <rect x="120" y="62" width="400" height="16" rx="2" fill="#1a1a1a"/>
    <rect x="120" y="62" width="220" height="16" rx="2" fill="#eab308"/>
    <text x="530" y="75" font-family="monospace" font-size="14" fill="#eab308">55</text>

    <text x="0" y="105" font-family="monospace" font-size="14" fill="#666">Overall</text>
    <rect x="120" y="92" width="400" height="16" rx="2" fill="#1a1a1a"/>
    <rect x="120" y="92" width="200" height="16" rx="2" fill="#eab308"/>
    <text x="530" y="105" font-family="monospace" font-size="14" fill="#eab308">50</text>
  </g>

  <!-- Verdict -->
  <text x="600" y="510" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#eab308">VERDICT: KINDA MID</text>

  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">vibecheck.doruk.ch</text>
</svg>
