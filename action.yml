name: 'vibechecked'
description: 'Automated UI design review — roast your deploy previews on every PR'
author: 'peaktwilight'

inputs:
  url:
    description: 'The deployed preview URL to check'
    required: true
  threshold:
    description: 'Minimum overall score to pass (exits with code 1 if below)'
    required: false
    default: '0'
  mode:
    description: 'Analysis mode: "no-ai" (heuristic, default for CI) or "ai" (requires Claude CLI)'
    required: false
    default: 'no-ai'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npm ci
        npx playwright install chromium --with-deps

    - name: Build
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npm run build

    - name: Run vibechecked
      id: vibecheck
      shell: bash
      run: |
        cd ${{ github.action_path }}
        RESULT=$(node dist/cli.js --json --no-ai "${{ inputs.url }}" 2>/dev/null || node dist/cli.js --json --no-ai "${{ inputs.url }}")
        echo "result<<EOF" >> $GITHUB_OUTPUT
        echo "$RESULT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # Extract score for threshold check
        SCORE=$(echo "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const j=JSON.parse(d);console.log(j.scores.overall)")
        echo "score=$SCORE" >> $GITHUB_OUTPUT

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const result = JSON.parse(`${{ steps.vibecheck.outputs.result }}`);
          const url = '${{ inputs.url }}';
          const s = result.scores;

          const bar = (val) => {
            const filled = Math.round(val / 5);
            const empty = 20 - filled;
            return '\u2588'.repeat(filled) + '\u2591'.repeat(empty);
          };

          const verdictEmoji = {
            'CERTIFIED ORIGINAL': '\uD83C\uDFC6',
            'MOSTLY FRESH': '\u2705',
            'KINDA MID': '\uD83D\uDE10',
            'GENERIC AF': '\u26A0\uFE0F',
            'VIBE-CODED CLONE': '\uD83D\uDC80',
          };

          const emoji = verdictEmoji[result.verdict] || '\uD83D\uDD0D';

          const body = `## ${emoji} vibechecked: ${result.verdict}

          **URL:** ${url}
          **Overall Score:** ${s.overall}/100
          **Vibe-coded probability:** ${result.vibe_coded_probability}%

          | Dimension | Score | |
          |-----------|-------|-|
          | Originality | ${s.originality} | \`${bar(s.originality)}\` |
          | Layout | ${s.layout} | \`${bar(s.layout)}\` |
          | Typography | ${s.typography} | \`${bar(s.typography)}\` |
          | Color | ${s.color} | \`${bar(s.color)}\` |

          ### \uD83D\uDD25 The Roast
          > ${result.roast}

          ${result.red_flags.length > 0 ? '### \uD83D\uDEA9 Red Flags\n' + result.red_flags.map(f => `- ${f}`).join('\n') : ''}

          ${result.good_parts.length > 0 ? '### \u2705 What\'s Good\n' + result.good_parts.map(g => `- ${g}`).join('\n') : ''}

          ---
          *[vibechecked](https://github.com/peaktwilight/vibechecked) — the only design review that doesn't care about your feelings*`;

          // Find and update existing comment or create new
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes('vibechecked:'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Check threshold
      if: inputs.threshold != '0'
      shell: bash
      run: |
        SCORE=${{ steps.vibecheck.outputs.score }}
        THRESHOLD=${{ inputs.threshold }}
        if [ "$SCORE" -lt "$THRESHOLD" ]; then
          echo "::error::vibechecked score ($SCORE) is below threshold ($THRESHOLD)"
          exit 1
        fi
        echo "vibechecked score ($SCORE) meets threshold ($THRESHOLD) ✅"

branding:
  icon: 'eye'
  color: 'green'
