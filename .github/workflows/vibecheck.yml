name: vibechecked

on:
  workflow_call:
    inputs:
      url:
        description: 'The deployed preview URL to check'
        required: true
        type: string
      threshold:
        description: 'Minimum score to pass'
        required: false
        type: number
        default: 0

jobs:
  vibecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: peaktwilight/vibechecked@main
        with:
          url: ${{ inputs.url }}
          threshold: ${{ inputs.threshold }}
